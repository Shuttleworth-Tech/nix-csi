# SPDX-License-Identifier: MIT
# Fork CI: builds images and pushes to Shuttleworth-Tech GHCR
# Stripped: nixbuild remote builder, arm64 builds, cachix push
on:
  push:
    branches:
      - develop
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REPO_USERNAME: ${{ github.actor }}
  REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}

permissions:
  contents: write
  packages: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Setup Nix environment
        uses: ./.github/actions/setup-nix
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          cache_key: build

      - name: Build and push environments to cachix
        run: |
          unlink nix-envs || true
          nix build --show-trace --file . push --out-link nix-envs
          ./nix-envs/bin/push
        # Only push if CACHIX_AUTH_TOKEN is available
        if: env.CACHIX_AUTH_TOKEN != ''

      - name: Build environments (no push)
        run: |
          unlink nix-envs || true
          nix build --show-trace --file . push --out-link nix-envs
        if: env.CACHIX_AUTH_TOKEN == ''

      - name: Build and push amd64 nix image
        run: |
          unlink nix-nix || true
          nix build --show-trace --file . nixImage.pushArch.x86_64-linux --out-link nix-nix
          ./nix-nix/bin/push-nix-x86_64-linux

      - name: Tag nix image as latest and version-only
        run: |
          # We only build amd64, so just tag it as latest directly
          # Also create a version-only tag (without arch suffix) for kubenix manifests
          NIX_VER=$(nix eval --raw --file . 'pkgs.nix.version')
          APP_VER=$(python3 -c 'import tomllib; print(tomllib.load(open("pkgs/nixkube/pyproject.toml","rb"))["project"]["version"])')
          SRC_TAG="${NIX_VER}-${APP_VER}-x86_64-linux"
          nix shell nixpkgs#regctl -c bash -c "
            regctl registry login -u=\"$REPO_USERNAME\" -p=\"$REPO_TOKEN\" ghcr.io
            regctl image copy ghcr.io/shuttleworth-tech/nix-csi/nix:${SRC_TAG} ghcr.io/shuttleworth-tech/nix-csi/nix:latest
            regctl image copy ghcr.io/shuttleworth-tech/nix-csi/nix:${SRC_TAG} ghcr.io/shuttleworth-tech/nix-csi/nix:${NIX_VER}-${APP_VER}
          "

      - name: Build and push scratch image
        run: |
          unlink nix-scratches || true
          nix build --show-trace --file . scratchImage.push --out-link nix-scratches
          ./nix-scratches/bin/push

      - name: Build and push environments to cachix
        run: |
          nix build --show-trace --file . push --out-link nix-envs
          ./nix-envs/bin/push
        if: env.CACHIX_AUTH_TOKEN != ''

      - name: Build environments (no push)
        run: |
          nix build --show-trace --file . push --out-link nix-envs
        if: env.CACHIX_AUTH_TOKEN == ''

  test-kind:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Setup Nix environment
        uses: ./.github/actions/setup-nix
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          cache_key: test-kind

      - name: Create Kind cluster
        uses: helm/kind-action@v1.14.0

      - name: Clean runner
        run: |
          sudo rm --recursive --force /home/runner/.cache

      - name: Create GHCR pull secret
        run: |
          kubectl create namespace nixkube || true
          kubectl create secret docker-registry ghcr-pull \
            --namespace=nixkube \
            --docker-server=ghcr.io \
            --docker-username="$REPO_USERNAME" \
            --docker-password="$REPO_TOKEN" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl annotate secret ghcr-pull -n nixkube \
            kluctl.io/skip-delete=true --overwrite

      - name: Deploy nix-csi
        run: |
          nix build --show-trace --file . kubenixCI1.deploymentScript
          ./result/bin/kubenixDeploy --yes

      - name: Wait for nix-csi node daemonset
        run: |
          kubectl rollout status daemonset -l app.kubernetes.io/component=node -n nixkube --timeout=180s

      - name: Wait for nix-csi cache pod
        run: |
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/component=pynixd -n nixkube --timeout=180s

      - name: Deploy test workloads
        run: |
          nix build --show-trace --file . kubenixCITest.deploymentScript
          ./result/bin/kubenixDeploy --yes

      - name: Wait for NRI plugin registration
        run: |
          echo "Waiting 15s for NRI plugin to register with containerd..."
          sleep 15

      - name: Wait for fast test workloads
        run: |
          kubectl wait --for=condition=complete \
            job/flake-hello job/path-hello job/commandpath-hello job/env-ssl \
            -n nixkube --timeout=300s

      - name: Wait for slow test workloads
        run: |
          kubectl wait --for=condition=complete \
            job/expr-hello \
            -n nixkube --timeout=600s

      - name: Wait for NRI test workloads
        run: |
          kubectl wait --for=condition=complete \
            job/nri-hello-ro job/nri-hello-rw \
            -n nixkube --timeout=300s

      - name: Debug on failure
        if: failure()
        run: |
          echo "=== Cluster state ==="
          kubectl get all -A
          echo "=== Secrets in nixkube ==="
          kubectl get secrets -n nixkube
          echo "=== Init pod describe ==="
          kubectl describe pod -l app.kubernetes.io/component=init -n nixkube || true
          echo "=== Node pod describe ==="
          kubectl describe pod -l app.kubernetes.io/component=node -n nixkube || true
          echo "=== Events ==="
          kubectl get events -n nixkube --sort-by='.lastTimestamp' || true
          echo "=== Node pod logs ==="
          kubectl logs -l app.kubernetes.io/component=node -n nixkube --tail -1 || true
          echo "=== Cache pod logs ==="
          kubectl logs -l app.kubernetes.io/component=pynixd -n nixkube --tail -1 || true

  release:
    needs: [build, test-kind]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Setup Nix environment
        uses: ./.github/actions/setup-nix
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          cache_key: release

      - name: Render deployment manifest
        run: |
          nix build --show-trace --file . kubenixApply.manifestYAMLFile
          cp result nix-csi-deployment.yaml

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: nix-csi-deployment.yaml
          draft: false
          prerelease: false
