[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "nri-wait"
version = "0.1.0"
description = "OCI hook that waits for NRI build completion"
license = { text = "MIT" }
authors = [{ name = "nixkube contributors" }]

dependencies = [
  "pyzmq",
]

[project.scripts]
wait = "nri_wait.__main__:main"
