[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "grpclib-ttrpc"
version = "0.1.0"
description = "ttrpc server and client built on grpclib primitives"
authors = [{ name = "lillecarl", email = "github@lillecarl.com" }]
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
  "grpclib",
  "multidict",
  "ttrpc",
]
