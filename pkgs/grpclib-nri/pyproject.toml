[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "grpclib-nri"
version = "0.1.0"
description = "NRI protocol utilities built on grpclib-ttrpc"
authors = [{ name = "lillecarl", email = "github@lillecarl.com" }]
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
  "grpclib-ttrpc",
  "typing_extensions",
]

[project.optional-dependencies]
test = [
  "pytest>=8",
  "pytest-asyncio>=0.24",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
